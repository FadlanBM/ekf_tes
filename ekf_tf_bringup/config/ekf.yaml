ekf_filter_node:
  ros__parameters:
    frequency: 30.0  # Naikkan ke 30Hz agar lebih smooth
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom
    
    # Subscribe ke data mentah dari Teensy
    odom0: teensy_odom_raw
    
    # Matriks Konfigurasi Mecanum
    odom0_config: [true,  true,  false,  # Fuse X, Y (Posisi absolut dari deadwheel)
                   false, false, true,   # Fuse Yaw (Rotasi dari IMU)
                   true,  true,  false,  # Fuse Vx, Vy (Kecepatan translasi & strafe)
                   false, false, true,   # Fuse Vyaw (Kecepatan putar)
                   false, false, false]