amcl:
  ros__parameters:
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    base_frame_id: base_link
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: /scan
    use_sim_time: false
bt_navigator:
  ros__parameters:
    global_frame: map
    odom_topic: /odometry/filtered
    robot_base_frame: base_link
    use_sim_time: false
controller_server:
  ros__parameters:
    FollowPath:
      angular_dist_threshold: 0.785
      base_frame_id: base_link
      forward_sampling_distance: 0.5
      plugin: nav2_rotation_shim_controller::RotationShimController
      primary_controller: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
    controller_frequency: 20.0
    controller_plugins:
    - FollowPath
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    goal_checker_plugins:
    - general_goal_checker
    min_theta_velocity_threshold: 0.001
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    progress_checker:
      movement_time_allowance: 10.0
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
    progress_checker_plugin: progress_checker
    use_sim_time: false
global_costmap:
  global_costmap:
    ros__parameters:
      footprint: '[[0.36, 0.36], [0.36, -0.36], [-0.36, -0.36], [-0.36, 0.36]]'
      global_frame: map
      inflation_layer:
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
        plugin: nav2_costmap_2d::InflationLayer
      obstacle_layer:
        enabled: true
        observation_sources: scan
        plugin: nav2_costmap_2d::ObstacleLayer
        scan:
          clearing: true
          data_type: LaserScan
          marking: true
          max_obstacle_height: 2.0
          topic: /scan
      plugins:
      - static_layer
      - obstacle_layer
      - inflation_layer
      publish_frequency: 1.0
      robot_base_frame: base_link
      static_layer:
        map_subscribe_transient_local: true
        plugin: nav2_costmap_2d::StaticLayer
      update_frequency: 1.0
      use_sim_time: false
local_costmap:
  local_costmap:
    ros__parameters:
      footprint: '[[0.36, 0.36], [0.36, -0.36], [-0.36, -0.36], [-0.36, 0.36]]'
      global_frame: odom
      height: 3
      obstacle_layer:
        enabled: true
        observation_sources: scan
        plugin: nav2_costmap_2d::ObstacleLayer
        scan:
          clearing: true
          data_type: LaserScan
          marking: true
          max_obstacle_height: 2.0
          topic: /scan
      plugins:
      - obstacle_layer
      - inflation_layer
      publish_frequency: 2.0
      resolution: 0.05
      robot_base_frame: base_link
      rolling_window: true
      update_frequency: 5.0
      use_sim_time: false
      width: 3
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: /home/fadlan/Documents/EKF_TES/ekf_tf_bringup/map/TES.yaml
planner_server:
  ros__parameters:
    GridBased:
      allow_unknown: true
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5
      use_astar: false
    expected_planner_frequency: 20.0
    planner_plugins:
    - GridBased
    use_sim_time: false

